<index.html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #f2f2f7;
  --card:     #ffffff;
  --sec:      #f2f2f7;
  --ter:      #e5e5ea;
  --border:   rgba(0,0,0,0.08);
  --border-h: rgba(0,0,0,0.14);
  --text:     #1d1d1f;
  --text-2:   #6e6e73;
  --text-3:   #aeaeb2;
  --ink:      #1d1d1f;
  --ink-d:    rgba(0,0,0,0.05);
  --ink-m:    rgba(0,0,0,0.10);
  --up:       #ff3b30;
  --up-d:     rgba(255,59,48,0.08);
  --dn:       #30d158;
  --dn-d:     rgba(48,209,88,0.09);
  --warn:     #ff9f0a;
  --r:        14px;
  --r-sm:     9px;
  --r-xs:     5px;
  --sh:       0 1px 4px rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.04);
  --sh-md:    0 2px 12px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05);
  --sh-lg:    0 8px 32px rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.06);
}
html,body{height:100%;font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:4px;}
.mono{font-family:'SF Mono',ui-monospace,'Fira Code',monospace;}
.up{color:var(--up);} .dn{color:var(--dn);}
.up-bg{background:var(--up-d);} .dn-bg{background:var(--dn-d);}

/* APP */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* NAVBAR */
.nav{display:flex;align-items:center;padding:0 20px;height:52px;background:rgba(255,255,255,0.82);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.logo{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.4px;margin-right:28px;display:flex;align-items:center;gap:8px;user-select:none;}
.logo-icon{width:26px;height:26px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:6px 16px;border-radius:8px;border:none;background:transparent;color:var(--text-2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .16s;}
.nav-tab:hover{background:var(--ter);color:var(--text);}
.nav-tab.active{background:var(--ter);color:var(--text);font-weight:600;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--dn);background:var(--dn-d);padding:3px 10px;border-radius:20px;}
.live-dot{width:5px;height:5px;background:var(--dn);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ICON BTN */
.ibtn{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:none;border-radius:var(--r-sm);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .16s;box-shadow:var(--sh);}
.ibtn:hover{background:var(--ter);color:var(--text);box-shadow:var(--sh-md);transform:translateY(-1px);}
.ibtn:active{transform:translateY(0);}
.ibtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ibtn .tip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(29,29,31,.9);backdrop-filter:blur(8px);color:#fff;font-size:11px;font-weight:500;padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .16s;z-index:300;}
.ibtn:hover .tip{opacity:1;}
.ibtn.on{background:var(--ter);color:var(--text);box-shadow:none;}

/* VIEWS */
.view{display:none;flex:1;overflow:hidden;}
.view.active{display:flex;}

/* STOCK VIEW */
#view-stocks{flex-direction:column;}
.stock-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;flex-shrink:0;}
.stock-bar::-webkit-scrollbar{height:0;}
.chip{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:10px;background:var(--card);border:1.5px solid transparent;cursor:pointer;transition:all .16s;white-space:nowrap;flex-shrink:0;box-shadow:var(--sh);}
.chip:hover{box-shadow:var(--sh-md);transform:translateY(-1px);border-color:var(--border);}
.chip:active{transform:translateY(0);}
.chip.active{border-color:rgba(0,0,0,0.22);background:var(--ter);box-shadow:var(--sh);}
.chip .sym{font-size:12px;font-weight:700;color:var(--text);}
.chip.active .sym{color:var(--text);}
.chip .cpx{font-family:'SF Mono',ui-monospace,monospace;font-size:11px;color:var(--text-2);}
.chip .cpc{font-family:'SF Mono',ui-monospace,monospace;font-size:10px;font-weight:600;}
.chip .rm{width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text-3);font-size:10px;transition:all .12s;}
.chip .rm:hover{background:var(--ter);color:var(--text-2);}
.add-chip{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:10px;border:1.5px dashed var(--border-h);background:transparent;color:var(--text-3);cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all .16s;flex-shrink:0;}
.add-chip:hover{border-color:var(--text);color:var(--text);background:var(--ter);}
.add-chip svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;}

.main-content{display:flex;flex:1;overflow:hidden;}

/* CHART SECTION */
.chart-sec{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--card);}
.chart-hdr{display:flex;align-items:center;gap:14px;padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.p-block{display:flex;flex-direction:column;gap:3px;}
.p-sym{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;}
.p-main{font-family:'SF Mono',ui-monospace,monospace;font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px;}
.p-pill{font-family:'SF Mono',ui-monospace,monospace;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;}
.chart-ctrl{display:flex;align-items:center;gap:8px;margin-left:auto;}
.seg{display:flex;background:var(--ter);border-radius:var(--r-sm);padding:2px;gap:1px;}
.seg-btn{padding:4px 14px;border-radius:7px;border:none;background:transparent;color:var(--text-2);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .16s;}
.seg-btn.active{background:var(--card);color:var(--text);box-shadow:var(--sh);}

.ohlc-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.ohlc-bar::-webkit-scrollbar{height:0;}
.ohlc-cell{display:flex;align-items:center;gap:5px;padding:6px 14px;border-right:1px solid var(--border);}
.ohlc-cell:last-child{border-right:none;}
.ok{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.4px;}
.ov{font-family:'SF Mono',ui-monospace,monospace;font-size:11px;color:var(--text-2);}

.chart-wrap{position:relative;flex:1;min-height:0;}
#main-chart{width:100%;height:100%;}
.vol-wrap{height:72px;border-top:1px solid var(--border);position:relative;flex-shrink:0;}
.vol-lbl{position:absolute;top:6px;left:12px;z-index:5;font-size:9px;font-weight:700;color:var(--text-3);letter-spacing:.8px;}
#vol-chart{width:100%;height:100%;}
.ind-sec{height:116px;border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.ind-tabs{display:flex;padding:0 14px;border-bottom:1px solid var(--border);}
.itab{padding:6px 14px;background:transparent;border:none;color:var(--text-3);font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .14s;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.3px;}
.itab:hover{color:var(--text-2);}
.itab.active{color:var(--text);border-bottom-color:var(--text);}
.ind-wrap{flex:1;}
#ind-chart{width:100%;height:100%;}

/* AI PANEL */
.ai-panel{width:240px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;background:var(--bg);}
.ai-hdr{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:rgba(255,255,255,.7);backdrop-filter:blur(12px);}
.ai-hdr-t{font-size:12px;font-weight:700;letter-spacing:-.1px;}
.ai-tag{margin-left:auto;font-size:9px;font-weight:700;background:var(--ter);color:var(--text-2);padding:2px 8px;border-radius:20px;letter-spacing:.3px;}

/* Score */
.score-card{margin:12px;padding:16px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh-md);display:flex;flex-direction:column;align-items:center;gap:8px;}
.score-ring{width:72px;height:72px;position:relative;}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-n{font-family:'SF Mono',ui-monospace,monospace;font-size:22px;font-weight:700;line-height:1;transition:color .4s;}
.score-d{font-size:9px;font-weight:600;color:var(--text-3);}
.score-lbl{font-size:11px;font-weight:600;color:var(--text-2);}

/* Signals */
.sig-grid{margin:0 12px 10px;display:flex;flex-direction:column;gap:4px;}
.sig-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border-radius:var(--r-sm);box-shadow:var(--sh);font-size:11px;transition:all .2s;}
.sig-item.on{box-shadow:0 0 0 1.5px rgba(48,209,88,.35),var(--sh);}
.sig-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--ter);transition:background .2s;}
.sig-dot.on{background:var(--dn);}
.sig-name{flex:1;font-weight:500;color:var(--text-2);}
.sig-val{font-family:'SF Mono',ui-monospace,monospace;font-size:9px;color:var(--text-3);}

/* TP/SL */
.tpsl{margin:0 12px 10px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh-md);overflow:hidden;}
.tpsl-hdr{padding:7px 12px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;color:var(--text-3);letter-spacing:.7px;background:var(--sec);}
.tpsl-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);gap:8px;transition:background .12s;}
.tpsl-row:last-child{border-bottom:none;}
.tpsl-row:hover{background:var(--sec);}
.tpsl-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;}
.tag-e{background:var(--ter);color:var(--text-2);}
.tag-tp{background:var(--up-d);color:var(--up);}
.tag-sl{background:var(--dn-d);color:var(--dn);}
.tpsl-p{font-family:'SF Mono',ui-monospace,monospace;font-size:13px;font-weight:700;margin-left:auto;}
.tpsl-pct{font-family:'SF Mono',ui-monospace,monospace;font-size:9px;color:var(--text-3);}

/* AI Text */
.ai-txt{margin:0 12px 14px;}
.ai-box{font-size:12px;color:var(--text-2);line-height:1.8;padding:12px;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);min-height:80px;margin-bottom:8px;}
.ai-btn{width:100%;padding:10px;background:var(--text);border:none;border-radius:var(--r-sm);color:#fff;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .16s;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.ai-btn:hover:not(:disabled){background:#3a3a3c;box-shadow:0 4px 14px rgba(0,0,0,.25);transform:translateY(-1px);}
.ai-btn:active{transform:translateY(0);}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.ai-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;}

/* INDEX VIEW */
#view-index{flex-direction:column;overflow-y:auto;padding:24px;gap:24px;background:var(--bg);}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sec-t{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;}
.sec-line{flex:1;height:1px;background:var(--border);}

/* TWII */
.twii-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh-md);padding:22px 24px;display:flex;align-items:center;gap:22px;transition:all .16s;cursor:default;}
.twii-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);}
.twii-badge{background:linear-gradient(135deg,#1d1d1f,#3a3a3c);border-radius:12px;padding:10px 14px;color:#fff;font-size:11px;font-weight:700;text-align:center;min-width:64px;box-shadow:0 4px 12px rgba(0,0,0,.22);}
.twii-badge div:first-child{font-size:18px;margin-bottom:2px;}
.twii-vr{width:1px;height:48px;background:var(--border);}
.twii-info{flex:1;}
.twii-sub{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.4px;margin-bottom:3px;}
.twii-name{font-size:13px;font-weight:500;color:var(--text-2);}
.twii-p{font-family:'SF Mono',ui-monospace,monospace;font-size:32px;font-weight:700;line-height:1;letter-spacing:-1.5px;}
.twii-c{font-family:'SF Mono',ui-monospace,monospace;font-size:13px;font-weight:600;margin-top:4px;}
.twii-t{margin-left:auto;font-size:10px;font-weight:500;color:var(--text-3);}

/* US Grid */
.us-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.idx-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh-md);padding:18px;transition:all .16s;cursor:default;}
.idx-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);}
.idx-s{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;margin-bottom:2px;}
.idx-f{font-size:11px;color:var(--text-3);margin-bottom:12px;}
.idx-p{font-family:'SF Mono',ui-monospace,monospace;font-size:22px;font-weight:700;margin-bottom:7px;letter-spacing:-.5px;}
.idx-row{display:flex;align-items:center;gap:7px;}
.idx-pill{font-family:'SF Mono',ui-monospace,monospace;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}

/* Themes */
.theme-list{display:flex;flex-direction:column;gap:8px;}
.theme-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;display:flex;align-items:center;gap:13px;transition:all .16s;}
.theme-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.theme-bar{width:4px;height:36px;border-radius:3px;flex-shrink:0;}
.theme-info{flex:1;min-width:0;}
.theme-n{font-size:13px;font-weight:600;}
.theme-d{font-size:11px;color:var(--text-3);margin-top:2px;font-weight:500;}
.theme-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.thr-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;border-radius:7px;background:var(--sec);color:var(--text-3);cursor:pointer;transition:all .12s;flex-shrink:0;}
.thr-btn:hover{background:var(--ter);color:var(--text-2);}
.thr-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.add-theme{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;margin-top:4px;border:1.5px dashed var(--border-h);border-radius:var(--r);background:transparent;color:var(--text-3);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .16s;}
.add-theme:hover{border-color:var(--text);color:var(--text);background:var(--ter);}
.add-theme svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;animation:fi .15s ease;}
@keyframes fi{from{opacity:0}}
.modal{background:rgba(255,255,255,.95);backdrop-filter:blur(40px) saturate(180%);border-radius:18px;padding:28px;width:380px;box-shadow:0 32px 80px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.08);border:1px solid rgba(255,255,255,.9);animation:su .2s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{transform:scale(.96) translateY(-10px);opacity:0}}
.modal h3{font-size:17px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px;}
.modal p{font-size:13px;color:var(--text-2);margin-bottom:18px;line-height:1.7;}
.modal strong{color:var(--text);font-weight:700;}
.modal input{width:100%;padding:10px 14px;margin-bottom:10px;background:var(--sec);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:all .16s;}
.modal input:focus{border-color:var(--text-2);background:#fff;box-shadow:0 0 0 3px rgba(0,0,0,.06);}
.modal input::placeholder{color:var(--text-3);}
.modal-row{display:flex;gap:8px;}
.btn-c{flex:1;padding:10px;background:var(--ter);border:none;border-radius:var(--r-sm);color:var(--text-2);cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:all .14s;}
.btn-c:hover{background:var(--border-h);color:var(--text);}
.btn-ok{flex:1;padding:10px;background:var(--text);border:none;border-radius:var(--r-sm);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:all .14s;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.btn-ok:hover{background:#3a3a3c;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:rgba(29,29,31,.92);backdrop-filter:blur(12px);color:#fff;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:500;box-shadow:var(--sh-lg);z-index:999;transform:translateY(60px);opacity:0;transition:all .28s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok::before{content:'✓  ';color:var(--dn);}
.toast.err::before{content:'✕  ';color:var(--up);}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">

<nav class="nav">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    StockFlow
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="stocks">個股分析</button>
    <button class="nav-tab" data-view="index">指數總覽</button>
  </div>
  <div class="nav-right">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <button class="ibtn" id="btn-ref"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg><span class="tip">刷新</span></button>
    <button class="ibtn" id="btn-add-nav"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="tip">新增股票</span></button>
    <button class="ibtn" id="btn-bb"><svg viewBox="0 0 24 24"><path d="M3 12h18M3 6s3 2.5 9 2.5S21 6 21 6M3 18s3-2.5 9-2.5 9 2.5 9 2.5"/></svg><span class="tip">布林通道</span></button>
  </div>
</nav>

<!-- STOCKS VIEW -->
<div class="view active" id="view-stocks">
  <div class="stock-bar" id="stock-bar">
    <button class="add-chip" id="add-chip-btn"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增股票</button>
  </div>
  <div class="main-content">
    <div class="chart-sec">
      <div class="chart-hdr">
        <div class="p-block">

<script>
const ST={
  stocks:JSON.parse(localStorage.getItem('sf3_stocks')||'["2330","2317","00940","AAPL","NVDA"]'),
  active:null,ivl:'1d',showBB:true,activeInd:'macd',
  themes:JSON.parse(localStorage.getItem('sf3_themes')||JSON.stringify([
    {name:'AI伺服器',desc:'CoWoS / 先進封裝',str:'強勢'},
    {name:'電動車',desc:'特斯拉台灣供應鏈',str:'盤整'},
    {name:'金融股',desc:'升息受益 / 壽險回穩',str:'溫和'},
  ])),
  chartData:null,editThemeIdx:-1,
};
let mC=null,vC=null,iC=null,cS=null,bbU=null,bbM=null,bbL=null,vS=null;
let mD=null,mSig=null,mH=null,kK=null,kD=null,rL=null,rU=null,rLo=null;
const $=id=>document.getElementById(id);
const fmt=(n,d=2)=>n==null?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtV=v=>!v?'—':v>1e8?(v/1e8).toFixed(2)+'億':v>1e4?(v/1e4).toFixed(1)+'萬':v.toLocaleString();
function toast(msg,type=''){const e=$('toast');e.textContent=msg;e.className='toast show'+(type?' '+type:'');setTimeout(()=>e.className='toast',2800);}
function save(){localStorage.setItem('sf3_stocks',JSON.stringify(ST.stocks));localStorage.setItem('sf3_themes',JSON.stringify(ST.themes));}
function toY(s){s=s.trim().toUpperCase();if(/^\d{4,5}$/.test(s))return s.length===4?s+'.TW':s+'.TWO';return s;}
function disp(s){return s.replace(/\.(TW|TWO)$/,'');}
const PX='https://corsproxy.io/?';
async function fetchYF(sym,ivl,rng){const u=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=${ivl}&range=${rng}&includePrePost=false`;const r=await fetch(PX+encodeURIComponent(u));if(!r.ok)throw new Error('fetch');return r.json();}
async function loadSD(raw,ivl='1d'){const sym=toY(raw),rng=ivl==='15m'?'5d':'6mo';const d=await fetchYF(sym,ivl,rng);const res=d?.chart?.result?.[0];if(!res)throw new Error('no data');const ts=res.timestamp,q=res.indicators.quote[0];const candles=ts.map((t,i)=>({time:ivl==='15m'?t:Math.floor(t),open:q.open[i],high:q.high[i],low:q.low[i],close:q.close[i],volume:q.volume[i]})).filter(c=>c.open&&c.close);return{candles,meta:res.meta};}
function ema(a,p){const k=2/(p+1);let e=null;return a.map(v=>{if(!v)return null;if(e===null){e=v;return e;}e=v*k+e*(1-k);return e;});}
function sma(a,p){return a.map((_,i)=>i<p-1?null:a.slice(i-p+1,i+1).reduce((s,b)=>s+b,0)/p);}
function calcMACD(c){const e12=ema(c,12),e26=ema(c,26);const dif=e12.map((v,i)=>v&&e26[i]?v-e26[i]:null);const sig=ema(dif.map(v=>v??0),9);const hist=dif.map((v,i)=>v!=null?v-sig[i]:null);return{dif,sig,hist};}
function calcKD(hi,lo,cl,p=9){let pK=50,pD=50;const K=[],D=[];cl.forEach((_,i)=>{if(i<p-1){K.push(null);D.push(null);return;}const sh=hi.slice(i-p+1,i+1),sl=lo.slice(i-p+1,i+1);const hh=Math.max(...sh),ll=Math.min(...sl);const rsv=hh===ll?50:((cl[i]-ll)/(hh-ll))*100;const k=pK*2/3+rsv/3,d=pD*2/3+k/3;K.push(k);D.push(d);pK=k;pD=d;});return{K,D};}
function calcRSI(c,p=14){return c.map((_,i)=>{if(i<p)return null;let g=0,l=0;for(let j=i-p+1;j<=i;j++){const d=c[j]-c[j-1];d>0?g+=d:l-=d;}const rs=l===0?100:g/p/(l/p);return 100-100/(1+rs);});}
function calcBB(c,p=20,m=2){const mid=sma(c,p);const up=[],lo=[];c.forEach((_,i)=>{if(!mid[i]){up.push(null);lo.push(null);return;}const sl=c.slice(i-p+1,i+1),mn=mid[i];const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mn)**2,0)/p);up.push(mn+m*std);lo.push(mn-m*std);});return{up,mid,lo};}
function calcATR(hi,lo,cl,p=14){const tr=cl.map((_,i)=>i===0?hi[i]-lo[i]:Math.max(hi[i]-lo[i],Math.abs(hi[i]-cl[i-1]),Math.abs(lo[i]-cl[i-1])));return sma(tr,p);}
function calcSig(candles){
  const c=candles.map(x=>x.close),h=candles.map(x=>x.high),l=candles.map(x=>x.low),v=candles.map(x=>x.volume);
  const n=c.length,i=n-1,j=n-2;
  const m5=sma(c,5),m20=sma(c,20),m60=sma(c,60);
  const{dif,sig,hist}=calcMACD(c);const{K,D}=calcKD(h,l,c);
  const rsi=calcRSI(c);const bb=calcBB(c);const atr=calcATR(h,l,c);
  const sigs={
    trend:{on:!!(m5[i]&&m20[i]&&m60[i]&&m5[i]>m20[i]&&m20[i]>m60[i]),val:m5[i]?`MA5:${fmt(m5[i],0)}`:'—'},
    kd:{on:K[i]!=null&&K[i]<30&&K[i]>(K[j]??K[i]),val:K[i]!=null?`K:${fmt(K[i],1)}`:'—'},
    macd:{on:hist[i]!=null&&hist[j]!=null&&hist[i]>0&&hist[j]<=0,val:hist[i]!=null?`H:${fmt(hist[i],3)}`:'—'},
    vol:{on:v[i]>([...v].slice(-6,-1).reduce((a,b)=>a+b,0)/5)*1.3,val:fmtV(v[i])},
    bb:{on:!!(bb.lo[i]&&c[i]<bb.lo[i]*1.01&&c[i]>c[j]),val:bb.lo[i]?`L:${fmt(bb.lo[i],1)}`:'—'},
    rsi:{on:rsi[i]!=null&&rsi[i]<35&&rsi[i]>(rsi[j]??rsi[i]),val:rsi[i]!=null?`${fmt(rsi[i],1)}`:'—'},
  };
  const score=Object.values(sigs).filter(s=>s.on).length;
  const curATR=atr[i]??c[i]*0.02,entry=c[i];
  return{sigs,score,entry,sl:entry-curATR*1.5,tp:entry+curATR*3};
}
function updateSigUI({sigs,score,entry,sl,tp}){
  const arc=$('score-arc'),tot=188.4;
  arc.style.strokeDashoffset=tot-(score/6)*tot;
  const cols=['#aeaeb2','#aeaeb2','#6e6e73','#6e6e73','#3a3a3c','#1d1d1f','#1d1d1f'];
  arc.style.stroke=cols[score];$('score-n').textContent=score;$('score-n').style.color=cols[score];
  $('score-lbl').textContent=score>=5?'強烈買入信號':score>=3?'觀察等待':'信號偏弱';
  [['trend','s-trend','sv-trend'],['kd','s-kd','sv-kd'],['macd','s-macd','sv-macd'],['vol','s-vol','sv-vol'],['bb','s-bb','sv-bb'],['rsi','s-rsi','sv-rsi']].forEach(([k,sid,vid])=>{
    const el=$(sid),dot=el.querySelector('.sig-dot'),on=sigs[k].on;
    dot.className='sig-dot'+(on?' on':'');el.className='sig-item'+(on?' on':'');$(vid).textContent=sigs[k].val;
  });
  $('te').textContent=fmt(entry);$('ttp').textContent=fmt(tp);$('ttp-p').textContent='+'+fmt(((tp-entry)/entry)*100,1)+'%';$('tsl').textContent=fmt(sl);$('tsl-p').textContent='-'+fmt(((entry-sl)/entry)*100,1)+'%';
}
const CO=(extra={})=>({autoSize:true,layout:{background:{type:'solid',color:'#ffffff'},textColor:'#aeaeb2'},grid:{vertLines:{color:'rgba(0,0,0,0.04)'},horzLines:{color:'rgba(0,0,0,0.04)'}},crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:'rgba(0,0,0,.15)',width:1},horzLine:{color:'rgba(0,0,0,.15)',width:1}},rightPriceScale:{borderColor:'rgba(0,0,0,0.08)',...(extra.rps||{})},timeScale:{borderColor:'rgba(0,0,0,0.08)',timeVisible:true,secondsVisible:false,...(extra.ts||{})},handleScroll:true,handleScale:true});
function initCharts(){
  mC=LightweightCharts.createChart($('main-chart'),CO());
  vC=LightweightCharts.createChart($('vol-chart'),CO({ts:{visible:false}}));
  iC=LightweightCharts.createChart($('ind-chart'),CO({ts:{visible:false}}));
  vC.priceScale('right').applyOptions({visible:false});iC.priceScale('right').applyOptions({scaleMargins:{top:.1,bottom:.1}});
  cS=mC.addCandlestickSeries({upColor:'#ff3b30',downColor:'#30d158',borderUpColor:'#ff3b30',borderDownColor:'#30d158',wickUpColor:'#ff3b30',wickDownColor:'#30d158'});
  bbU=mC.addLineSeries({color:'rgba(0,0,0,.18)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
  bbM=mC.addLineSeries({color:'rgba(0,0,0,.1)',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  bbL=mC.addLineSeries({color:'rgba(0,0,0,.18)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
  vS=vC.addHistogramSeries({priceScaleId:'v'});vC.priceScale('v').applyOptions({scaleMargins:{top:0,bottom:0}});
  mC.subscribeCrosshairMove(p=>{if(!p.time)return;const c=p.seriesData.get(cS);if(c){$('oo').textContent=fmt(c.open);$('oh').textContent=fmt(c.high);$('ol').textContent=fmt(c.low);$('oc').textContent=fmt(c.close);}const vc=p.seriesData.get(vS);if(vc)$('ov').textContent=fmtV(vc.value);});
  buildInd('macd');
}
function buildInd(type){
  [mD,mSig,mH,kK,kD,rL,rU,rLo].filter(Boolean).forEach(s=>{try{iC.removeSeries(s);}catch(e){}});
  mD=mSig=mH=kK=kD=rL=rU=rLo=null;
  if(type==='macd'){mD=iC.addLineSeries({color:'#3a3a3c',lineWidth:1,priceLineVisible:false,lastValueVisible:false});mSig=iC.addLineSeries({color:'#aeaeb2',lineWidth:1,priceLineVisible:false,lastValueVisible:false});mH=iC.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});}
  else if(type==='kd'){kK=iC.addLineSeries({color:'#3a3a3c',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});kD=iC.addLineSeries({color:'#aeaeb2',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});}
  else if(type==='rsi'){rL=iC.addLineSeries({color:'#3a3a3c',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});rU=iC.addLineSeries({color:'rgba(255,59,48,.3)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});rLo=iC.addLineSeries({color:'rgba(48,209,88,.3)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});}
  if(ST.chartData)renderInd(ST.chartData.candles,type);
}
function toSer(arr,times){return arr.map((v,i)=>v!=null?{time:times[i],value:v}:null).filter(Boolean);}
function renderCharts({candles}){
  const c=candles.map(x=>x.close),h=candles.map(x=>x.high),l=candles.map(x=>x.low),t=candles.map(x=>x.time);
  cS.setData(candles.map(x=>({time:x.time,open:x.open,high:x.high,low:x.low,close:x.close})));
  const bb=calcBB(c);bbU.setData(toSer(bb.up,t));bbM.setData(toSer(bb.mid,t));bbL.setData(toSer(bb.lo,t));
  vS.setData(candles.map(x=>({time:x.time,value:x.volume,color:x.close>=x.open?'rgba(255,59,48,.38)':'rgba(48,209,88,.38)'})));
  const last=candles[candles.length-1];$('oo').textContent=fmt(last.open);$('oh').textContent=fmt(last.high);$('ol').textContent=fmt(last.low);$('oc').textContent=fmt(last.close);$('ov').textContent=fmtV(last.volume);
  renderInd(candles,ST.activeInd);
  const sd=calcSig(candles);ST.chartData={candles,sigData:sd};updateSigUI(sd);
}
function renderInd(candles,type){
  const c=candles.map(x=>x.close),h=candles.map(x=>x.high),l=candles.map(x=>x.low),t=candles.map(x=>x.time);
  if(type==='macd'&&mD){const m=calcMACD(c);mD.setData(toSer(m.dif,t));mSig.setData(toSer(m.sig,t));mH.setData(toSer(m.hist,t).map(d=>({...d,color:d.value>=0?'rgba(255,59,48,.55)':'rgba(48,209,88,.55)'})));}
  else if(type==='kd'&&kK){const{K,D}=calcKD(h,l,c);kK.setData(toSer(K,t));kD.setData(toSer(D,t));}
  else if(type==='rsi'&&rL){const r=calcRSI(c);rL.setData(toSer(r,t));rU.setData(t.map(x=>({time:x,value:70})));rLo.setData(t.map(x=>({time:x,value:30})));}
}
async function loadStock(raw){
  ST.active=raw;$('p-sym').textContent=disp(raw);$('p-main').textContent='…';$('p-chg').textContent='';
  try{
    const data=await loadSD(raw,ST.ivl);renderCharts(data);

    const chg=price-prev,pct=(chg/prev)*100,up=chg>=0;
    $('p-main').textContent=fmt(price);
    const pill=$('p-chg');pill.textContent=`${up?'+':''}${fmt(chg)}  ${up?'+':''}${fmt(pct,2)}%`;pill.className='p-pill '+(up?'up up-bg':'dn dn-bg');

  }catch(e){toast('無法載入 '+raw+' 請確認代號','err');$('p-main').textContent='—';}

function renderBar(){
  const bar=$('stock-bar'),btn=$('add-chip-btn');
  bar.querySelectorAll('.chip').forEach(c=>c.remove());
  ST.stocks.forEach(s=>{
    const d=document.createElement('div');d.className='chip'+(s===ST.active?' active':'');
    d.innerHTML=`<span class="sym">${disp(s)}</span><span class="cpx" id="cp-${s.replace(/\W/g,'_')}">…</span><span class="cpc" id="cc-${s.replace(/\W/g,'_')}"></span><span class="rm" data-rm="${s}">✕</span>`;
    d.addEventListener('click',e=>{if(e.target.dataset.rm){rmStock(e.target.dataset.rm);return;}ST.active=s;renderBar();loadStock(s);});
    bar.insertBefore(d,btn);
  });
}
function updateChipP(raw,price,pct,up){const k=raw.replace(/\W/g,'_');const pe=$('cp-'+k),ce=$('cc-'+k);if(pe)pe.textContent=fmt(price,1);if(ce){ce.textContent=(up?'+':'')+fmt(pct,1)+'%';ce.className='cpc '+(up?'up':'dn');}}
function rmStock(s){ST.stocks=ST.stocks.filter(x=>x!==s);save();if(ST.active===s){ST.active=ST.stocks[0]||null;if(ST.active)loadStock(ST.active);}renderBar();}
async function addStock(raw){raw=raw.trim().toUpperCase();if(!raw)return;const d=disp(raw);if(ST.stocks.some(s=>disp(s)===d)){toast('已存在','err');return;}try{await loadSD(d);ST.stocks.push(d);save();renderBar();loadStock(d);toast('已新增 '+d,'ok');}catch(e){toast('找不到代號 '+raw,'err');}}
const US=[{sym:'^GSPC',short:'S&P 500',full:"Standard & Poor's"},{sym:'^IXIC',short:'NASDAQ',full:'Nasdaq Composite'},{sym:'^DJI',short:'DJIA',full:'Dow Jones Industrial'},{sym:'^RUT',short:'Russell 2000',full:'Small Cap Index'}];
async function loadIdx(){
  try{const d=await loadSD('^TWII','1d');const m=d.meta,p=m.regularMarketPrice,prev=m.previousClose||m.chartPreviousClose;const chg=p-prev,pct=(chg/prev)*100,up=chg>=0;$('twii-p').textContent=fmt(p);$('twii-c').innerHTML=`<span class="${up?'up':'dn'}">${up?'+':''}${fmt(chg)}  (${up?'+':''}${fmt(pct,2)}%)</span>`;$('twii-t').textContent='更新 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}catch(e){}
  const grid=$('us-grid');
  grid.innerHTML=US.map(u=>`<div class="idx-card"><div class="idx-s">${u.short}</div><div class="idx-f">${u.full}</div><div class="idx-p" id="ip-${u.sym.replace(/\W/g,'_')}">—</div><div class="idx-row"><span class="idx-pill" id="ic-${u.sym.replace(/\W/g,'_')}">—</span><span style="font-family:ui-monospace,monospace;font-size:10px;font-weight:600;color:var(--text-3)" id="ia-${u.sym.replace(/\W/g,'_')}"></span></div></div>`).join('');
  US.forEach(async u=>{try{const d=await loadSD(u.sym,'1d');const m=d.meta,p=m.regularMarketPrice,prev=m.previousClose||m.chartPreviousClose;const chg=p-prev,pct=(chg/prev)*100,up=chg>=0;const k=u.sym.replace(/\W/g,'_');const pe=$('ip-'+k),pl=$('ic-'+k),pa=$('ia-'+k);if(pe)pe.textContent=fmt(p);if(pl){pl.textContent=(up?'+':'')+fmt(pct,2)+'%';pl.className='idx-pill '+(up?'up up-bg':'dn dn-bg');}if(pa){pa.textContent=(up?'+':'')+fmt(chg);pa.className=up?'up':'dn';}}catch(e){}});
}
const SC={'強勢':'#ff3b30','盤整':'#ff9f0a','弱勢':'#30d158','溫和':'#6e6e73'};
const SB={'強勢':'rgba(255,59,48,.08)','盤整':'rgba(255,159,10,.09)','弱勢':'rgba(48,209,88,.08)','溫和':'rgba(110,110,115,.1)'};
function renderThemes(){
  const list=$('theme-list');
  list.innerHTML=ST.themes.map((t,i)=>{const col=SC[t.str]||'#6e6e73',bg=SB[t.str]||'rgba(110,110,115,.08)';return`<div class="theme-card"><div class="theme-bar" style="background:${col}"></div><div class="theme-info"><div class="theme-n">${t.name}</div><div class="theme-d">${t.desc}</div></div><span class="theme-tag" style="color:${col};background:${bg}">${t.str}</span><button class="thr-btn" data-edit="${i}"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="thr-btn" data-del="${i}"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button></div>`;}).join('');
  list.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openTM(+b.dataset.edit)));
  list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{ST.themes.splice(+b.dataset.del,1);save();renderThemes();}));
}
function openTM(idx=-1){ST.editThemeIdx=idx;$('tm-title').textContent=idx>=0?'編輯題材':'新增題材';if(idx>=0){const t=ST.themes[idx];$('tm-name').value=t.name;$('tm-desc').value=t.desc;$('tm-str').value=t.str;}else{['tm-name','tm-desc','tm-str'].forEach(id=>$(id).value='');}$('theme-modal').classList.add('open');setTimeout(()=>$('tm-name').focus(),80);}
async function runAI(){
  if(!ST.chartData){toast('請先載入股票','err');return;}
  const btn=$('ai-btn'),out=$('ai-out');btn.disabled=true;btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> 分析中…';out.textContent='Claude 正在分析技術指標…';
  const{sigs,score,entry,sl,tp}=ST.chartData.sigData;
  const sigTxt=Object.entries(sigs).map(([k,v])=>`${v.on?'✅':'❌'} ${{trend:'均線多排',kd:'KD超賣',macd:'MACD轉多',vol:'量能放大',bb:'布林反彈',rsi:'RSI超賣'}[k]} (${v.val})`).join('\n');
  const prompt=`你是台股技術分析師，根據以下數據給出簡短交易建議（繁體中文，120字內）：\n股票：${disp(ST.active)}｜現價：${fmt(entry)}｜共振分數：${score}/6\n${sigTxt}\n進場：${fmt(entry)}｜止盈：${fmt(tp)}（+${fmt(((tp-entry)/entry)*100,1)}%）｜止損：${fmt(sl)}（-${fmt(((entry-sl)/entry)*100,1)}%）\n格式：①信號判讀 ②操作建議 ③主要風險`;
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});const d=await r.json();out.textContent=d.content?.[0]?.text||'分析失敗，請重試';}catch(e){out.textContent='⚠️ 無法連線 AI，請稍後再試';}
  btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg> AI 分析當前行情';
}
setInterval(()=>{if(ST.active)loadStock(ST.active);},60000);
const openAdd=()=>{$('add-modal').classList.add('open');setTimeout(()=>$('add-inp').focus(),80);};
const closeAdd=()=>{$('add-modal').classList.remove('open');$('add-inp').value='';};
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));t.classList.add('active');$('view-'+t.dataset.view).classList.add('active');if(t.dataset.view==='index')loadIdx();}));
document.querySelectorAll('.seg-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');ST.ivl=b.dataset.ivl;if(ST.active)loadStock(ST.active);}));
document.querySelectorAll('.itab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.itab').forEach(x=>x.classList.remove('active'));b.classList.add('active');ST.activeInd=b.dataset.ind;buildInd(b.dataset.ind);}));
const toggleBB=()=>{ST.showBB=!ST.showBB;[bbU,bbM,bbL].forEach(s=>s?.applyOptions({visible:ST.showBB}));$('btn-bb').classList.toggle('on',ST.showBB);};
$('btn-bb').addEventListener('click',toggleBB);
$('btn-add-nav').addEventListener('click',openAdd);$('add-chip-btn').addEventListener('click',openAdd);$('add-cancel').addEventListener('click',closeAdd);$('add-ok').addEventListener('click',()=>{addStock($('add-inp').value);closeAdd();});
$('add-inp').addEventListener('keydown',e=>{if(e.key==='Enter')$('add-ok').click();if(e.key==='Escape')closeAdd();});
$('add-modal').addEventListener('click',e=>{if(e.target===$('add-modal'))closeAdd();});
$('btn-ref').addEventListener('click',async()=>{const b=$('btn-ref');b.style.opacity='.5';if(ST.active)await loadStock(ST.active);b.style.opacity='';});
$('ai-btn').addEventListener('click',runAI);
[$('btn-add-theme'),$('add-theme-btn')].forEach(b=>b?.addEventListener('click',()=>openTM(-1)));
$('tm-cancel').addEventListener('click',()=>$('theme-modal').classList.remove('open'));
$('tm-ok').addEventListener('click',()=>{const name=$('tm-name').value.trim(),desc=$('tm-desc').value.trim(),str=$('tm-str').value.trim()||'盤整';if(!name)return;const t={name,desc,str};if(ST.editThemeIdx>=0)ST.themes[ST.editThemeIdx]=t;else ST.themes.push(t);save();renderThemes();$('theme-modal').classList.remove('open');});
['tm-name','tm-desc','tm-str'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')$('tm-ok').click();if(e.key==='Escape')$('theme-modal').classList.remove('open');}));
$('theme-modal').addEventListener('click',e=>{if(e.target===$('theme-modal'))$('theme-modal').classList.remove('open');});
function init(){initCharts();renderBar();renderThemes();$('btn-bb').classList.add('on');if(ST.stocks.length){ST.active=ST.stocks[0];loadStock(ST.active);renderBar();}}
if(typeof LightweightCharts!=='undefined')init();else window.addEventListener('load',init);
</script>
</body>
</html>
